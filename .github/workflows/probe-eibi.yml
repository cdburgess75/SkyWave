name: Probe EiBi coverage (investigation)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Inspect EiBi frequency range
        run: node scripts/probe-eibi.mjs
