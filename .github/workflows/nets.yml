name: Mirror live nets

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes (GitHub may add a few minutes of lag)
  workflow_dispatch:          # manual run button

permissions:
  contents: write

concurrency:
  group: nets-mirror
  cancel-in-progress: true

jobs:
  nets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Fetch nets from NetLogger servers
        run: node scripts/fetch-nets.mjs
      - name: Publish to single-commit data branch
        run: |
          cd out
          git init -b data
          git config user.name "skywave-nets-mirror"
          git config user.email "actions@users.noreply.github.com"
          git add nets.json
          git commit -m "nets @ $(date -u +%FT%TZ)"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
